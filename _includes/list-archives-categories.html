<div class="archives archives-type-terms archives-type-categories">
    <h2>카테고리</h2>
    <ul class="list-terms list-categories">
        {% for category in site.categories %}
        {% capture categoryName %}{{ category | first }}{% endcapture %}
        <li><a href="{{ site.collections.categories.permalink | replace: ':title', categoryName }}">{{ categoryName }}</a></li>
        {% endfor %}
    </ul>
</div>

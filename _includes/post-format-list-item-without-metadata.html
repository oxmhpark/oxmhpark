<article class="entry entry-format-list-item">
  <h3 class="entry-title"><a href="{{ post.url }}">{% include parts-title.html %}</a></h3>

  <div class="entry-body">
    {{ post.excerpt | strip_html }}
  </div>

  <div class="read-more">
    <a href="{{ post.url }}">{{ site.format.read_more.label }}</a>
  </div>
</article>
